name: Type Check & Lint

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "*.json"
      - ".github/workflows/type-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "*.json"
      - ".github/workflows/type-check.yml"

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check
